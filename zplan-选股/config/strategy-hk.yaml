version: "1"
rule_version: "pick-hk-2026-06"
market: hk

scan:
  min_bars: 60
  min_score: 50.0
  min_turnover_rate: 0.05        # 港股流动性阈值可更低
  min_volume: 0
  exclude_st: false               # 港股无 ST 制度
  exclude_bj: false
  # 港股专属过滤
  exclude_penny: true             # 排除仙股（价格 < HK$0.5）
  penny_threshold: 0.5
  prefilter_top_multiplier: 5

weights:
  technical: 0.50
  financial: 0.10                 # 港股财报数据可能不完整，略降权重
  news: 0.18
  industry_relative: 0.10
  cross_market: 0.12              # A+H 跨市场联动 Alpha

filters:
  max_pe_ttm: null                # 估值限制较宽松（港股可做空/无涨跌停）
  min_total_mv: null
  max_total_mv: null
  max_ret_20d: null               # 港股无涨跌停，不设动量上限
  max_high_60d_pct: null          # 同理

signals:
  require_any: []

intraday:
  afternoon_volume_share_bonus: 3
  volume_ratio_high_bonus: 4
  volume_ratio_high_threshold: 1.3

market_health:
  min_panel_rows: 200             # 港股 ~2500 只，截面阈值降低
  max_stale_days: 3

llm:
  enabled: true
  model: deepseek-chat
  scan_brief: true

rule_init:
  llm_top_n: 200                  # 港股池子小，Top200 足够
  llm_batch_size: 10

# 最终排序：与 A 股相同，LLM 为主
ranking:
  mode: llm_primary
  llm_weight: 0.75
  rule_weight: 0.25
  resort_after_llm: true
